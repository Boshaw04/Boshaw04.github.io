<title>🍽️ 点菜啦</title>
<style>
:root{--bg:#fffaf5;--card:#fff;--text:#333;--sub:#999;--accent:#ff6b6b;--accent2:#ffa94d;--tag-bg:#fff0f0;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.container{max-width:480px;margin:0 auto;padding:0 16px 100px}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(255,250,245,.92);backdrop-filter:blur(20px);padding:16px 0 8px}
.header h1{font-size:22px;text-align:center;margin-bottom:12px}
.header h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Main tabs */
.main-tabs{display:flex;gap:12px;justify-content:center;margin-bottom:8px}
.main-tab{flex:1;max-width:120px;padding:14px 8px;border-radius:var(--radius);border:2px solid transparent;background:var(--card);text-align:center;cursor:pointer;transition:all .3s;box-shadow:var(--shadow);font-size:14px;font-weight:600;user-select:none;-webkit-tap-highlight-color:transparent}
.main-tab:active{transform:scale(.95)}
.main-tab.active{border-color:var(--accent);background:#fff5f5}
.main-tab .icon{font-size:28px;display:block;margin-bottom:4px}
.main-tab .label{font-size:12px;color:var(--sub)}

/* Category tabs */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 0;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:wrap}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;background:var(--card);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:var(--shadow);user-select:none;-webkit-tap-highlight-color:transparent}
.cat-tab:active{transform:scale(.95)}
.cat-tab.active{background:var(--accent);color:#fff}

/* Dish cards */
.dish-grid{display:grid;gap:10px}
.dish-card{display:flex;gap:12px;padding:14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:all .2s;align-items:center;user-select:none;-webkit-tap-highlight-color:transparent}
.dish-card:active{transform:scale(.98)}
.dish-card .emoji{width:56px;height:56px;min-width:56px;border-radius:12px;object-fit:cover;font-size:36px;display:flex;align-items:center;justify-content:center;background:#f8f8f8}
.dish-card .info{flex:1;min-width:0}
.dish-card .name{font-size:15px;font-weight:600;margin-bottom:2px}
.dish-card .desc{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dish-card .actions{display:flex;gap:8px;align-items:center}
.btn-add{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-add:active{transform:scale(.9);background:#e55a5a}
.btn-fav{width:30px;height:30px;border-radius:50%;border:none;background:transparent;font-size:18px;cursor:pointer;transition:all .2s}
.btn-fav.faved{animation:heartBeat .4s}
@keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* Blind box page */
.blind-section{text-align:center;padding:20px 0}
.blind-cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.blind-cat{padding:8px 16px;border-radius:20px;border:2px solid #eee;background:var(--card);font-size:13px;cursor:pointer;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent}
.blind-cat.selected{border-color:var(--accent);background:#fff5f5}
.blind-btn{display:inline-block;padding:16px 48px;border-radius:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;font-weight:700;cursor:pointer;border:none;margin:20px 0;transition:all .3s;box-shadow:0 8px 24px rgba(255,107,107,.3)}
.blind-btn:active{transform:scale(.95)}
.blind-btn:disabled{opacity:.5;pointer-events:none}

/* Blind box */
.blind-stage{position:relative;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px 0}
.gift-box{font-size:90px;cursor:pointer;transition:all .3s;user-select:none;-webkit-tap-highlight-color:transparent}
.gift-box.bouncing{animation:bounceBox .3s ease-in-out infinite}
.gift-box.revealing{animation:openBox .6s ease-out forwards}
@keyframes bounceBox{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-25px) scale(1.08)}}
@keyframes openBox{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(10deg)}60%{transform:scale(0.5) rotate(-5deg);opacity:.5}100%{transform:scale(0);opacity:0}}
.result-card{background:var(--card);border-radius:var(--radius);padding:24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12);margin:16px 0;display:none;width:100%}
.result-card.show{display:block;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
.result-card .big-emoji{font-size:80px;display:block;margin-bottom:12px}
.result-card .big-img{width:120px;height:120px;border-radius:20px;object-fit:cover;margin-bottom:12px}
.result-card .dish-name{font-size:24px;font-weight:700;margin-bottom:4px}
.result-card .dish-desc{font-size:14px;color:var(--sub);margin-bottom:20px}
.result-btns{display:flex;gap:12px;justify-content:center}
.result-btn{padding:12px 28px;border-radius:25px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.result-btn:active{transform:scale(.95)}
.result-btn.primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(255,107,107,.3)}
.result-btn.secondary{background:var(--card);color:var(--text);border:2px solid #eee}

/* Surprise effect */
.surprise-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;pointer-events:none;display:none}
.surprise-overlay.show{display:block}
.heart{position:absolute;animation:floatUp 2s ease-out forwards;font-size:40px;pointer-events:none;filter:drop-shadow(0 0 6px rgba(255,100,100,.6))}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.8)}50%{opacity:1;transform:translateY(-30vh) scale(1.2)}100%{opacity:0;transform:translateY(-60vh) scale(1) rotate(15deg)}}
.sparkle{position:absolute;animation:sparkle 1.5s ease-out forwards;font-size:30px;pointer-events:none}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}30%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(.8)}}

@keyframes fadeInUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

/* Cart & Footer */
.cart-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;padding:12px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid #f0f0f0;z-index:100;display:flex;align-items:center;gap:12px}
.cart-info{flex:1}
.cart-count{font-size:12px;color:var(--sub)}
.cart-total{font-size:16px;font-weight:700;color:var(--accent)}
.cart-btn{padding:12px 24px;border-radius:25px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.cart-detail{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);max-width:480px;width:calc(100%-32px);background:var(--card);border-radius:var(--radius);box-shadow:0 -4px 20px rgba(0,0,0,.1);z-index:99;padding:16px;display:none;max-height:50vh;overflow-y:auto}
.cart-detail.open{display:block}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
.cart-item:last-child{border:none}
.cart-qty{display:flex;gap:8px;align-items:center}
.cart-qty button{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;background:var(--card);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-qty span{min-width:20px;text-align:center;font-weight:600}

/* Favorites */
.fav-grid{display:grid;gap:10px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-state .icon{font-size:60px;display:block;margin-bottom:12px}

/* Search */
.search-box{width:100%;padding:10px 16px;border-radius:25px;border:2px solid #eee;font-size:14px;margin:8px 0;outline:none;font-family:inherit;transition:border-color .3s}
.search-box:focus{border-color:var(--accent)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 24px;border-radius:25px;background:#333;color:#fff;font-size:14px;animation:fadeInUp .3s;pointer-events:none}
</style>
</head>

        <div class="main-tab ${activeTab==='fav'?'active':''}" onclick="switchTab('fav')">
          <span class="icon">❤️</span><span class="label">收藏</span>
        </div>
      </div>
    </div>
    ${activeTab==='menu'?renderMenu():''}
    ${activeTab==='blind'?renderBlind():''}
    ${activeTab==='fav'?renderFav():''}
  `;
  updateCartBar();
  if(activeTab==='menu') bindSearch();
}
function switchTab(t){activeTab=t;blindCats=[];searchQuery='';render()}

// ── MENU ──
function renderMenu(){
  const cats=Object.keys(MENU);
  let dishes=MENU[activeCat]||[];
  if(searchQuery) dishes=dishes.filter(d=>d.n.includes(searchQuery)||d.d.includes(searchQuery));
  return `
    <input class="search-box" id="searchInput" placeholder="🔍 搜搜想吃什么..." value="${searchQuery}">
    <div class="cat-tabs">${cats.map(c=>`<div class="cat-tab ${c===activeCat?'active':''}" onclick="selectCat('${c}')">${MENU[c][0].e} ${c}</div>`).join('')}</div>
    <div class="dish-grid">${dishes.map(d=>`
      <div class="dish-card">
        ${d.img?`<img class="emoji" src="${d.img}" loading="lazy" onerror="this.outerHTML='<div class=emoji>${d.e}</div>'">`:`<div class="emoji">${d.e}</div>`}
        <div class="info"><div class="name">${d.n}</div><div class="desc">${d.d}</div></div>
        <div class="actions">
          <button class="btn-fav ${favs.some(f=>f.n===d.n)?'faved':''}" onclick="event.stopPropagation();toggleFav('${d.n}')">${favs.some(f=>f.n===d.n)?'❤️':'🤍'}</button>
          <button class="btn-add" onclick="event.stopPropagation();addToCart('${d.n}')">+</button>
        </div>
      </div>`).join('')}</div>
    ${dishes.length===0?'<div class="empty-state"><span class="icon">🔍</span>没找到，换个关键词试试</div>':''}
  `;
}
function selectCat(c){activeCat=c;render()}
function bindSearch(){
  const inp=document.getElementById('searchInput');
  if(inp){inp.addEventListener('input',e=>{searchQuery=e.target.value;render()})}
}

// ── CART ──
function addToCart(name){
  const existing=cart.find(i=>i.n===name);
  if(existing) existing.qty++;
  else{const dish=findDish(name);cart.push({n:name,e:dish?.e||'🍽️',img:dish?.img||null,qty:1})}
  save();updateCartBar();render();toast(`已添加：${name}`)
}
function removeFromCart(name){
  const idx=cart.findIndex(i=>i.n===name);
  if(idx>=0){cart[idx].qty--;if(cart[idx].qty<=0)cart.splice(idx,1)}
  save();updateCartBar();renderCartDetail();render()
}
function findDish(name){for(const cat of Object.values(MENU)){const d=cat.find(i=>i.n===name);if(d)return d}return null}
function updateCartBar(){
  const count=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent=`已选 ${count} 道`;
}
function toggleCart(){
  const el=document.getElementById('cartDetail');
  el.classList.toggle('open');
  if(el.classList.contains('open')) renderCartDetail();
}
function renderCartDetail(){
  const el=document.getElementById('cartDetail');
  if(cart.length===0){el.innerHTML='<div style="text-align:center;padding:20px;color:#999">🛒 还没选菜呢</div>';return}
  el.innerHTML=cart.map(i=>`
    <div class="cart-item">
      <span>${i.e} ${i.n}</span>
      <div class="cart-qty">
        <button onclick="removeFromCart('${i.n}')">−</button>
        <span>${i.qty}</span>
        <button onclick="addToCart('${i.n}')">+</button>
      </div>
    </div>`).join('')+`<button class="result-btn primary" style="width:100%;margin-top:12px" onclick="cart=[];save();updateCartBar();toggleCart();render()">🗑️ 清空菜单</button>`;
}
function shareOrder(){
  if(cart.length===0){toast('还没选菜呢');return}
  let text='🍽️ 今日点单：\n'+cart.map(i=>`${i.e} ${i.n} x${i.qty}`).join('\n');
  if(navigator.share){navigator.share({title:'点单分享',text:text})}else{
    navigator.clipboard.writeText(text).then(()=>toast('已复制，去微信粘贴给她吧！')).catch(()=>toast('分享失败'))
  }
}

// ── FAVORITES ──
function toggleFav(name){
  const idx=favs.findIndex(f=>f.n===name);
  if(idx>=0) favs.splice(idx,1);
  else{const dish=findDish(name);if(dish)favs.push(dish)}
  save();render()
}
function renderFav(){
  if(favs.length===0) return '<div class="empty-state"><span class="icon">❤️</span>收藏喜欢的菜<br>点菜时长按 🤍 就能收藏</div>';
  return `<div class="fav-grid">${favs.map(d=>`
    <div class="dish-card" onclick="addToCart('${d.n}')">
      ${d.img?`<img class="emoji" src="${d.img}" loading="lazy" onerror="this.outerHTML='<div class=emoji>${d.e}</div>'">`:`<div class="emoji">${d.e}</div>`}
      <div class="info"><div class="name">${d.n}</div><div class="desc">${d.d}</div></div>
      <div class="actions">
        <button class="btn-fav faved" onclick="event.stopPropagation();toggleFav('${d.n}')">❤️</button>
        <button class="btn-add" onclick="event.stopPropagation();addToCart('${d.n}')">+</button>
      </div>
    </div>`).join('')}</div>`;
}

// ── BLIND BOX ──
function getAllDishes(cats){if(!cats||cats.length===0) cats=Object.keys(MENU);let all=[];for(const c of cats){all=all.concat(MENU[c])}return all}
function renderBlind(){
  const cats=Object.keys(MENU);
  return `
    <div class="blind-section">
      <p style="color:var(--sub);font-size:14px">选择分类（不选=全部），点击盲盒开启！</p>
      <div class="blind-cats">${cats.map(c=>`<div class="blind-cat ${blindCats.includes(c)?'selected':''}" onclick="toggleBlindCat('${c}')">${MENU[c][0].e} ${c}</div>`).join('')}</div>
      <div class="blind-stage">
        ${isRolling?`
          <div class="gift-box bouncing" id="giftBox">🎁</div>
          <p style="color:var(--sub);font-size:13px;margin-top:12px">正在揭开神秘美食...</p>
        `:blindResult?`
          <div class="result-card show">
            ${blindResult.img?`<img class="big-img" src="${blindResult.img}" onerror="this.outerHTML='<span class=big-emoji>${blindResult.e}</span>'">`:`<span class="big-emoji">${blindResult.e}</span>`}
            <div class="dish-name">${blindResult.n}</div>
            <div class="dish-desc">${blindResult.d}</div>
            <div class="result-btns">
              <button class="result-btn primary" onclick="addFromBlind()">✅ 就吃这个！</button>
              <button class="result-btn secondary" onclick="resetBlind()">🎲 再开一次</button>
            </div>
          </div>
        `:`
          <div class="gift-box" onclick="startBlind()" id="giftBox">🎁</div>
          <p style="color:var(--sub);font-size:13px;margin-top:12px">👆 点击盲盒开启</p>
        `}
      </div>
    </div>`;
}
function toggleBlindCat(c){const idx=blindCats.indexOf(c);if(idx>=0)blindCats.splice(idx,1);else blindCats.push(c);render()}
let blindResult=null;
function startBlind(){
  const all=getAllDishes(blindCats);
  if(all.length===0){toast('请先选分类');return}
  isRolling=true;blindResult=null;render();
  // Gift box bounces for ~2.5 seconds then reveals
  setTimeout(()=>{
    const box=document.getElementById('giftBox');
    if(box){box.classList.remove('bouncing');box.classList.add('revealing')}
    // After box opens, show result
    setTimeout(()=>revealResult(all),500)
  },2500);
}
function revealResult(all){
  const isSurprise=Math.random()<0.01;
  let dish;
  if(isSurprise){
    dish={e:'👑',n:'隐藏款·专属大餐',d:'✨ 今晚带你去吃最好的！不用选，全都安排上 ✨',img:null};
    showSurprise();
  }else{
    dish=all[Math.floor(Math.random()*all.length)];
  }
  blindResult=dish;isRolling=false;render();
}
function addFromBlind(){if(blindResult){addToCart(blindResult.n);blindResult=null;render();toast('已加入菜单 ✅')}}
function resetBlind(){blindResult=null;render()}

// ── SURPRISE EFFECT ──
function showSurprise(){
  const w=window.innerWidth,h=window.innerHeight;
  // Create overlay on the fly
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;pointer-events:none';
  for(let i=0;i<50;i++){
    const heart=document.createElement('div');
    heart.style.cssText=`position:absolute;font-size:${30+Math.random()*30}px;left:${Math.random()*w}px;top:${h*0.2+Math.random()*h*0.6}px;animation:floatUp ${1.5+Math.random()*2}s ease-out ${Math.random()*1}s forwards;pointer-events:none`;
    heart.textContent=['❤️','💕','✨','🌟','💖','🎀','💝'][Math.floor(Math.random()*7)];
    overlay.appendChild(heart);
  }
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.remove(),3000);
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
render();
</script>
</body>
</html>
